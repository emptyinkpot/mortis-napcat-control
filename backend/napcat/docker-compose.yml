services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    restart: unless-stopped
    network_mode: bridge
    environment:
      NAPCAT_UID: "1000"
      NAPCAT_GID: "1001"
    ports:
      - "127.0.0.1:3600:3000"
      - "127.0.0.1:3601:3001"
      - "127.0.0.1:16099:6099"
    volumes:
      - ./data/qq:/app/.config/QQ
      - ./data/config:/app/napcat/config
      - ./data/plugins:/app/napcat/plugins
