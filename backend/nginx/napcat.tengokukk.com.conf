server {
    server_name napcat.tengokukk.com;

    location / {
        proxy_pass http://127.0.0.1:16099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    client_max_body_size 10m;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/napcat.tengokukk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/napcat.tengokukk.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = napcat.tengokukk.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name napcat.tengokukk.com;
    return 404;
}
